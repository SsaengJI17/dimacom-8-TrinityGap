<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinity Airways - The Trinity Gap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --trinity-navy: #002c5f;
            --action-blue: #0066cc;
            --bg-light: #f8f9fa;
            --bg-dark: #1a1a1a;
            --text-ink: #1d1d1f;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 1. LOGO CONTINUITY SYSTEM (DOUBLE WRAPPER) --- */
        .intro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* 위치 이동 담당 */
        .logo-mover {
            /* 기존 transform 뒤에 filter를 추가하여 그림자도 부드럽게 나타나게 합니다 */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                filter 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            filter: drop-shadow(0px 0px 10px rgba(0, 0, 0, 0.4));
        }

        /* 회전 애니메이션 담당 */
        .logo-persistent-wrapper {
            width: 200px;
            height: 200px;
            animation: master-rotate 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .symbol-svg {
            width: 100%;
            height: 100%;
            overflow: visible !important;
        }

        .logo-part {
            opacity: 0;
            transform-origin: 136.6px 137.3px;
            animation: orbit-gather 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .top-part {
            --start-rot: -120deg;
            animation-delay: 0s;
        }

        .left-part {
            --start-rot: 120deg;
            animation-delay: 0.1s;
        }

        .right-part {
            --start-rot: 240deg;
            animation-delay: 0.2s;
        }

        .text-wrapper {
            width: 400px;
            margin-top: 25px;
            opacity: 0;
            /* 등장 애니메이션 */
            animation: text-appear 1s ease-out 1.3s forwards;
            /* 사라질 때 사용할 트랜지션 효과를 미리 정의합니다 */
            transition: opacity 0.8s ease-in-out;
        }

        .text-svg {
            width: 100%;
            height: auto;
        }

        /* 컬러 설명 영역 */
        #color-explanation {
            position: absolute;
            top: 55%;
            max-width: 650px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-in-out;
            pointer-events: none;
            color: var(--text-ink);
        }

        #color-explanation h2 {
            font-size: 40px;
            margin-bottom: 20px;
            color: var(--trinity-navy);
        }

        #color-explanation p {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-pill {
            display: inline-block;
            background: var(--action-blue);
            color: white;
            padding: 12px 32px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 17px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-pill:hover {
            background: #0055aa;
        }

        .btn-pill:active {
            transform: scale(0.95);
        }

        /* --- 상태별 클래스 --- */
        body.mode-light {
            background-color: var(--bg-light);
        }

        body.mode-explanation .logo-mover {
            transform: translateY(-50px) scale(1.2);
            /* [수정] 아래 줄의 그림자 값을 초기값과 맞추거나, 밝은 배경에 어울리게 조절하세요. */
            filter: drop-shadow(0px 0px 5px rgba(0, 0, 0, 0.1));
        }

        /* 선택자 이름을 HTML과 동일하게 .text-wrapper로 수정합니다 */
        body.mode-explanation .text-wrapper {
            opacity: 0 !important;
            visibility: hidden;
            /* 사라지는 속도를 조절하고 싶다면 0.8s를 변경하세요 */
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        body.mode-explanation #color-explanation {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Keyframes */
        @keyframes master-rotate {
            0% {
                transform: rotate(-90deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes orbit-gather {
            0% {
                opacity: 0;
                transform: rotate(var(--start-rot)) translate(0, -300px) rotate(calc(var(--start-rot) * -1));
            }

            30% {
                opacity: 1;
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) translate(0, 0) rotate(0deg);
            }
        }

        @keyframes text-appear {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

            <h2>The TRINITY</h2>
            <p><strong>TRINITY</strong>는 라틴어 <strong>Trinitas</strong>에서 유래한 단어로<br><strong>'셋이 하나로 모여 완전함을
                    이룬다'</strong>는 뜻을 가지며,<br>단순한 숫자의 개념을 넘어 서로 다른 요소들이 모일 때<br>비로소 더 큰 가치와 새로운 가능성이 창출 된다는 의미를 내포하고
                있습니다.</p>
            <button class="btn-pill" onclick="startJourney()">여정 시작하기</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('mode-explanation');
                document.body.classList.add('mode-light');
            }, 3500);
        });

        function startJourney() {
            // 페이드 아웃 효과 후 페이지 이동
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s';
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 500);
        }
    </script>
